version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: odontologia_db
    environment:
      POSTGRES_DB: odontologia_master
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: odontologia_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-odontologia-secret-key-123456
      - DATABASE_ROOT_URL=postgresql://postgres:postgres@db:5432/odontologia_master
      - ALLOWED_HOSTS=*,localhost,127.0.0.1
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: odontologia_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
